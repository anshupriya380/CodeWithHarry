<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Fonts</title>
    <style>
        p {
            font-family: cursive;
            font-size: 20px;
            line-height: 8.3em; 
            /* this is the space between the lines of text. It can be a number, a length, or a percentage. The default value is normal, which is typically around 1.2em. */
            /* font-weight: bold; */
        }
        span {
            font-weight: bold;
            font-style: italic;
        }



    </style>

</head>
<body>
    <h4>CSS Fonts</h4>
    <p>Lets learn about <span>CSS</span> fonts!</p>
</body>
</html>
