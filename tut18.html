<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors in CSS</title>
    <style>
        #firstPara{
            color: red;/* Color by name */
        }
        #secondPara{
            color: rgb(31, 31, 167); /* Color by RGB values */
        }
        #ThirdPara{
            color: #911e1e; /* Color by hexadecimal value */
            background-color: #37694e;
        }
    </style>
</head>
<body>
    <h3>Colors in CSS</h3>
    <p Id="firstPara">This paragraph has a background color of #ff0000 (red).</p>
    <P Id="secondPara">Colors in CSS are specified using hexadecimal values, RGB values, or named colors.</P>
    <p Id="ThirdPara">Colors is having different ways to be specified.</p>
</body>
</html>
